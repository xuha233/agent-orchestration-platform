# AOP Configuration File
# This file configures default settings for the Agent Orchestration Platform

# Provider configuration
providers:
  - claude
  - codex

# Default settings
defaults:
  timeout: 600        # Timeout in seconds
  format: report      # Output format: report, json, sarif
  max_parallel: 4     # Maximum parallel providers

# Path configuration
paths:
  repo: .             # Repository root
  runs: runs/         # Run records directory

# Project information (optional)
project:
  name: ""
  type: transformation  # exploratory, optimization, transformation, compliance_sensitive